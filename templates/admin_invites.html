<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invite Codes - LLM Gateway Admin</title>
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">LLM Gateway</a>
        </div>
        <div class="nav-links">
            <a href="/admin/dashboard">Dashboard</a>
            <a href="/admin/models">Models</a>
            <a href="/admin/upstreams">Upstreams</a>
            <a href="/admin/invites">Invites</a>
            <a href="/admin/users">Users</a>
            <a href="/api/admin/logout">Logout</a>
        </div>
    </nav>
    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h1>Invite Codes</h1>
            <div>
                <button class="btn btn-primary" onclick="createInvite()">Generate Single Code</button>
                <button class="btn btn-secondary" onclick="showBatchModal()">Generate Multiple</button>
            </div>
        </div>

        <div class="table-container">
            <table id="invites-table">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Created</th>
                        <th>Status</th>
                        <th>Used By</th>
                        <th>Used At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <!-- Batch Modal -->
    <div id="batch-modal" class="modal">
        <div class="modal-content">
            <h2>Generate Multiple Invite Codes</h2>
            <form id="batch-form">
                <div class="form-group">
                    <label for="count">Number of codes (1-100)</label>
                    <input type="number" id="count" name="count" min="1" max="100" value="10" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeBatchModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Generate</button>
                </div>
            </form>
        </div>
    </div>

    <!-- New Codes Modal -->
    <div id="codes-modal" class="modal">
        <div class="modal-content">
            <h2>Generated Invite Codes</h2>
            <p>Copy these codes - they won't be shown again!</p>
            <textarea id="codes-list" style="width: 100%; height: 200px; font-family: monospace;" readonly></textarea>
            <div class="modal-actions">
                <button type="button" class="btn btn-primary" onclick="copyCodes()">Copy to Clipboard</button>
                <button type="button" class="btn btn-secondary" onclick="closeCodesModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        async function loadInvites() {
            try {
                const response = await fetch('/api/admin/invites');
                const invites = await response.json();

                const tbody = document.querySelector('#invites-table tbody');
                tbody.innerHTML = '';

                if (invites.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6">No invite codes yet.</td></tr>';
                    return;
                }

                invites.forEach(invite => {
                    const status = invite.used
                        ? '<span class="badge badge-danger">Used</span>'
                        : '<span class="badge badge-success">Available</span>';

                    tbody.innerHTML += `
                        <tr>
                            <td><code>${invite.code}</code></td>
                            <td>${new Date(invite.created_at).toLocaleString()}</td>
                            <td>${status}</td>
                            <td>${invite.used_by_email || '-'}</td>
                            <td>${invite.used_at ? new Date(invite.used_at).toLocaleString() : '-'}</td>
                            <td>
                                ${!invite.used ? `<button class="btn btn-sm btn-danger" onclick="deleteInvite(${invite.id})">Delete</button>` : ''}
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error('Failed to load invites:', error);
            }
        }

        async function createInvite() {
            try {
                const response = await fetch('/api/admin/invites', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (response.ok) {
                    const data = await response.json();
                    alert('Invite code created: ' + data.code);
                    loadInvites();
                } else {
                    const error = await response.json();
                    alert(error.error || 'Failed to create invite');
                }
            } catch (error) {
                alert('Network error');
            }
        }

        function showBatchModal() {
            document.getElementById('batch-modal').style.display = 'block';
        }

        function closeBatchModal() {
            document.getElementById('batch-modal').style.display = 'none';
        }

        document.getElementById('batch-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const count = parseInt(document.getElementById('count').value);

            try {
                const response = await fetch('/api/admin/invites/batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ count })
                });

                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('codes-list').value = data.codes.join('\n');
                    closeBatchModal();
                    document.getElementById('codes-modal').style.display = 'block';
                    loadInvites();
                } else {
                    const error = await response.json();
                    alert(error.error || 'Failed to create invites');
                }
            } catch (error) {
                alert('Network error');
            }
        });

        function closeCodesModal() {
            document.getElementById('codes-modal').style.display = 'none';
        }

        function copyCodes() {
            const textarea = document.getElementById('codes-list');
            textarea.select();
            document.execCommand('copy');
            alert('Copied to clipboard!');
        }

        async function deleteInvite(id) {
            if (!confirm('Are you sure you want to delete this invite code?')) return;

            try {
                const response = await fetch(`/api/admin/invites/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadInvites();
                } else {
                    const error = await response.json();
                    alert(error.error || 'Failed to delete invite');
                }
            } catch (error) {
                alert('Network error');
            }
        }

        // Close modals on outside click
        window.onclick = (e) => {
            if (e.target === document.getElementById('batch-modal')) {
                closeBatchModal();
            }
            if (e.target === document.getElementById('codes-modal')) {
                closeCodesModal();
            }
        };

        loadInvites();
    </script>
</body>
</html>
