<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LLM Gateway</title>
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">LLM Gateway</a>
        </div>
        <div class="nav-links">
            <a href="/user/dashboard">Dashboard</a>
            <a href="/user/keys">API Keys</a>
            <a href="/user/models">Models</a>
            <a href="/api/user/logout">Logout</a>
        </div>
    </nav>
    <main class="container">
        <h1>Dashboard</h1>
        <p>Welcome, {{.User.Email}}!</p>

        <h2>Request Limits</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <h3>6-Hour Window</h3>
                <p class="stat-value" id="window-used">Loading...</p>
                <p class="stat-label"><span id="window-percent">0</span>% used</p>
                <div style="background: #e0e0e0; border-radius: 4px; height: 8px; margin-top: 8px;">
                    <div id="window-bar" style="background: #3498db; border-radius: 4px; height: 8px; width: 0%;"></div>
                </div>
                <p class="stat-label" style="margin-top: 8px;"><span id="window-remaining">800</span> remaining</p>
            </div>
            <div class="stat-card">
                <h3>Monthly</h3>
                <p class="stat-value" id="month-used">Loading...</p>
                <p class="stat-label"><span id="month-percent">0</span>% used</p>
                <div style="background: #e0e0e0; border-radius: 4px; height: 8px; margin-top: 8px;">
                    <div id="month-bar" style="background: #27ae60; border-radius: 4px; height: 8px; width: 0%;"></div>
                </div>
                <p class="stat-label" style="margin-top: 8px;"><span id="month-remaining">9600</span> remaining</p>
            </div>
        </div>

        <h2>Tokens by Model (This Month)</h2>
        <div class="table-container">
            <table id="tokens-table">
                <thead>
                    <tr>
                        <th>Model</th>
                        <th>Input Tokens</th>
                        <th>Output Tokens</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>
    <script>
        async function loadUsage() {
            try {
                const response = await fetch('/api/user/usage');
                const data = await response.json();

                // Update 6-hour window
                const windowUsed = data.rate_limits.window.used;
                const windowLimit = data.rate_limits.window.limit;
                const windowPercent = data.rate_limits.window.percent;
                document.getElementById('window-used').textContent = windowUsed + ' / ' + windowLimit;
                document.getElementById('window-percent').textContent = windowPercent.toFixed(1);
                document.getElementById('window-bar').style.width = Math.min(windowPercent, 100) + '%';
                document.getElementById('window-remaining').textContent = data.rate_limits.window.remaining;

                // Update monthly
                const monthUsed = data.rate_limits.month.used;
                const monthLimit = data.rate_limits.month.limit;
                const monthPercent = data.rate_limits.month.percent;
                document.getElementById('month-used').textContent = monthUsed + ' / ' + monthLimit;
                document.getElementById('month-percent').textContent = monthPercent.toFixed(1);
                document.getElementById('month-bar').style.width = Math.min(monthPercent, 100) + '%';
                document.getElementById('month-remaining').textContent = data.rate_limits.month.remaining;

                // Update tokens table
                const tbody = document.querySelector('#tokens-table tbody');
                tbody.innerHTML = '';
                if (data.tokens_by_model && data.tokens_by_model.length > 0) {
                    data.tokens_by_model.forEach(row => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${row.model_name}</td>
                                <td>${row.input_tokens.toLocaleString()}</td>
                                <td>${row.output_tokens.toLocaleString()}</td>
                            </tr>
                        `;
                    });
                } else {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">No usage data yet</td></tr>';
                }
            } catch (error) {
                console.error('Failed to load usage:', error);
            }
        }

        loadUsage();
    </script>
</body>
</html>
