server {
        listen 10.92.144.206:443 ssl;
        ssl_certificate /etc/letsencrypt/live/mtf.edu.ci/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mtf.edu.ci/privkey.pem;

        server_name llm.mtf.edu.ci;
        root /var/www/llmgw;

        # Root redirect
        location = / {
                return 301 /user/dashboard;
        }

        # Static files
        location /static/ {
                expires 30d;
                add_header Cache-Control "public, immutable";
        }

        # User pages (auth required)
        location /user/ {
                auth_request /api/auth/check;
                auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
                auth_request_set $auth_role $upstream_http_x_auth_role;
                auth_request_set $set_cookie $upstream_http_set_cookie;

                try_files /templates$uri.html =404;
                default_type text/html;
        }

        # Admin pages (auth required)
        location /admin/ {
                auth_request /api/auth/check;
                auth_request_set $auth_user_id $upstream_http_x_auth_user_id;
                auth_request_set $auth_role $upstream_http_x_auth_role;
                auth_request_set $set_cookie $upstream_http_set_cookie;

                try_files /templates$uri.html =404;
                default_type text/html;
        }

        # Auth failed - redirect directly to MTFPass login
        error_page 401 = @auth_failed;

        location @auth_failed {
                add_header Set-Cookie "mtf_auth=; Path=/; Domain=mtf.edu.ci; Max-Age=0; HttpOnly" always;
                return 302 https://auth.mtf.edu.ci/auth/login?origin=https://$host;
        }

        # API routes
        location /api/ {
                proxy_pass http://119.91.33.104:8080;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_pass_header Set-Cookie;
        }

        # OpenAI-compatible API
        location /openai/ {
                proxy_pass http://119.91.33.104:8080;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 300s;
                proxy_buffering off;
        }

        # Anthropic-compatible API
        location /anthropic/ {
                proxy_pass http://119.91.33.104:8080;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 300s;
                proxy_buffering off;
        }
}
